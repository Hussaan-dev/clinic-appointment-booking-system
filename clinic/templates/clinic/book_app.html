<!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="max-w-xl mx-auto p-6 bg-slate-900 text-slate-100">
<div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-2">
<h2 class="text-2xl font-bold">Book Appointment</h2>
<a href="{% url 'home' %}" class="text-sm text-slate-200 underline hover:text-white font-medium">Back</a>
</div>

<form method="get" class="p-6 rounded bg-slate-800/40 border-l-4 border-emerald-500 space-y-4 mb-6 [&_select]:w-full [&_select]:p-2 [&_select]:bg-slate-800 [&_select]:border [&_select]:border-slate-700 [&_select]:rounded [&_select]:[color-scheme:dark] [&_input]:w-full [&_input]:p-2 [&_input]:bg-slate-800 [&_input]:border [&_input]:border-slate-700 [&_input]:rounded [&_input]:[color-scheme:dark]">
<select name="doctor" onchange="this.form.submit()">
    {% for doc in doctors %}
    <option value="{{ doc.id }}" {% if doc.id|stringformat:"s" == selected_doctor_id %}selected{% endif %}>{{ doc.name }}</option>
    {% endfor %}
</select>
<input type="date" name="date" onchange="this.form.submit()" value="{{ selected_date|default:'' }}">
</form>

{% if slots %}
<ul class="p-6 rounded bg-slate-800/40 border-l-4 border-emerald-500 space-y-2">
    {% for slot in slots %}
    <li><a href="{% url 'create_appointment' %}?doctor={{ selected_doctor_id }}&time={{ slot|date:'Y-m-d\TH:i' }}" class="block p-2 bg-slate-800 rounded hover:bg-emerald-600">{{ slot|date:'g:i A' }}</a></li>
    {% endfor %}
</ul>
{% endif %}
</body>
</html>
