<!DOCTYPE html>
<html lang="en">
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="max-w-xl mx-auto p-6 bg-slate-900 text-slate-100">
    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-2">
        <h2 class="text-2xl font-bold">Book Appointment</h2>
        <a href="{% url 'home' %}" class="text-sm text-slate-200 underline hover:text-white font-medium">Back</a>
    </div>

    <form method="post" class="p-6 rounded bg-slate-800/40 border-l-4 border-emerald-500 space-y-4 [&_p]:mb-4 [&_label]:block [&_label]:text-sm [&_label]:text-slate-300 [&_label]:mb-1 [&_input]:w-full [&_input]:p-2 [&_input]:bg-slate-800 [&_input]:border [&_input]:border-slate-700 [&_input]:rounded [&_input]:[color-scheme:dark] [&_select]:w-full [&_select]:p-2 [&_select]:bg-slate-800 [&_select]:border [&_select]:border-slate-700 [&_select]:rounded [&_select]:[color-scheme:dark]">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 py-2 rounded font-bold">Book</button>
    </form>
</body>
</html>
